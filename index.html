<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Guru - APS Fatehgarh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="http://algebrite.org/dist/1.4.0/algebrite.bundle-for-browser.js"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .card-grad { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
        .nav-active { color: #38bdf8; position: relative; }
        .nav-active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px; background: #38bdf8; }
    </style>
</head>
<body>

    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900 transition-all duration-1000">
        <div class="text-center space-y-6">
            <div class="w-24 h-24 bg-sky-500 rounded-3xl mx-auto flex items-center justify-center shadow-2xl rotate-12">
                <i data-lucide="calculator" class="w-12 h-12 text-white -rotate-12"></i>
            </div>
            <h1 class="text-4xl font-black italic">MATHS GURU</h1>
            <p class="text-sky-400">Class 8th to 12th Master Solver</p>
        </div>
    </div>

    <main id="app-content" class="hidden min-h-screen pb-32">
        <header class="p-6 flex justify-between items-center">
            <h2 id="view-title" class="text-2xl font-bold italic text-sky-400">Dashboard</h2>
        </header>

        <div id="dynamic-view" class="px-6">
            <div class="grid grid-cols-2 gap-6 pt-6">
                <div onclick="renderView('doubt')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-4 border-b-4 border-sky-500 active:scale-95 transition">
                    <i data-lucide="help-circle" class="w-10 h-10 text-sky-400"></i><span class="font-bold">Doubt</span>
                </div>
                <div onclick="renderView('quiz')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-4 border-b-4 border-green-500 active:scale-95 transition">
                    <i data-lucide="brain" class="w-10 h-10 text-green-400"></i><span class="font-bold">Quiz</span>
                </div>
                <div onclick="renderView('syllabus')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-4 border-b-4 border-purple-500 active:scale-95 transition">
                    <i data-lucide="book-open" class="w-10 h-10 text-purple-400"></i><span class="font-bold">Syllabus</span>
                </div>
                <div onclick="renderView('notes')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-4 border-b-4 border-yellow-500 active:scale-95 transition">
                    <i data-lucide="file-text" class="w-10 h-10 text-yellow-400"></i><span class="font-bold">Notes</span>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-4 py-4 flex justify-around items-center z-40">
        <button onclick="renderView('doubt')" id="nav-doubt" class="text-slate-500"><i data-lucide="message-square"></i></button>
        <button onclick="renderView('quiz')" id="nav-quiz" class="text-slate-500"><i data-lucide="award"></i></button>
        <button onclick="renderView('syllabus')" id="nav-syllabus" class="text-slate-500"><i data-lucide="list"></i></button>
        <button onclick="renderView('notes')" id="nav-notes" class="text-slate-500"><i data-lucide="book"></i></button>
    </nav>

    <script>
        lucide.createIcons();
        let appData = { quiz: {}, syllabus: {}, notes: {} };

        async function loadAppData() {
            try {
                const [q, s, n] = await Promise.all([
                    fetch('quiz.json').then(r => r.json()),
                    fetch('syllabus.json').then(r => r.json()),
                    fetch('notes.json').then(r => r.json())
                ]);
                appData = { quiz: q, syllabus: s, notes: n };
            } catch (e) { console.error("JSON loading failed."); }
        }

        window.onload = async () => {
            await loadAppData();
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('opacity-0', 'invisible');
                document.getElementById('app-content').classList.remove('hidden');
            }, 2500);
        };

        function renderView(view) {
            const container = document.getElementById('dynamic-view');
            const title = document.getElementById('view-title');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            if(document.getElementById(`nav-${view}`)) document.getElementById(`nav-${view}`).classList.add('nav-active');

            if(view === 'doubt') {
                title.innerText = "Smart Solver";
                container.innerHTML = `
                    <div class="glass p-6 rounded-3xl border-2 border-sky-500/20">
                        <textarea id="math-box" class="w-full bg-transparent border-b border-slate-700 outline-none text-lg mb-4" placeholder="Try 1+2 or integrate(x^2)..."></textarea>
                        <button onclick="smartSolve()" class="w-full card-grad py-4 rounded-2xl font-bold">Solve Now</button>
                    </div>
                    <div id="result-area" class="mt-6 hidden"></div>
                `;
            } else if(view === 'quiz') { /* Same Quiz Logic as before */ }
            else if(view === 'notes') { /* Same Notes Logic as before */ }
            else if(view === 'syllabus') { /* Same Syllabus Logic as before */ }
            lucide.createIcons();
        }

        // DUAL-ENGINE SOLVER
        function smartSolve() {
            const input = document.getElementById('math-box').value;
            const resArea = document.getElementById('result-area');
            resArea.classList.remove('hidden');
            
            let finalAns = "";
            let method = "";

            try {
                // Pehle basic arithmetic try karein (1+2, 5*10 etc.)
                if (/^[0-9+\-*/().\s]+$/.test(input)) {
                    finalAns = math.evaluate(input);
                    method = "Basic Arithmetic Engine";
                } else {
                    // Agar variables hain (x, y) toh advanced engine
                    finalAns = Algebrite.run(input).toString();
                    method = "Advanced Algebraic Engine";
                }

                resArea.innerHTML = `
                    <div class="glass p-6 rounded-3xl border-l-4 border-green-500 animate-view">
                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Engine: ${method}</p>
                        <h4 class="text-sky-400 font-bold mb-2">Final Answer:</h4>
                        <p class="text-2xl font-bold text-white">${finalAns}</p>
                        <p class="text-xs text-slate-400 mt-4 italic">Verified by Maths Guru Modules</p>
                    </div>
                `;
            } catch(e) {
                resArea.innerHTML = `<div class="glass p-6 rounded-3xl text-red-400">Invalid Syntax. Try again!</div>`;
            }
        }
    </script>
</body>
</html>
