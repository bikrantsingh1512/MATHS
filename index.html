<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Guru Pro - APS Fatehgarh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="http://algebrite.org/dist/1.4.0/algebrite.bundle-for-browser.js"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .card-grad { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
        .nav-active { color: #38bdf8; position: relative; }
        .nav-active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px; background: #38bdf8; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.4s ease-out forwards; }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="enterApp()" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950 cursor-pointer">
        <div class="text-center space-y-8 p-6">
            <div class="w-28 h-28 card-grad rounded-[2.5rem] mx-auto flex items-center justify-center shadow-[0_20px_50px_rgba(14,165,233,0.3)] rotate-12 transition-transform active:scale-90">
                <i data-lucide="calculator" class="w-14 h-14 text-white -rotate-12"></i>
            </div>
            <div class="space-y-2">
                <h1 class="text-5xl font-black italic tracking-tighter text-white">MATHS GURU</h1>
                <p class="text-sky-400 font-bold tracking-[0.3em] text-xs uppercase">The Master Solver</p>
            </div>
            <div class="glass p-8 rounded-[3rem] border-sky-500/20 shadow-2xl space-y-4">
                <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Designed & Developed By</div>
                <div class="text-xl font-bold">Bikrant Singh & Abhinav Rajput</div>
                <div class="flex justify-center gap-4 text-sm font-bold text-sky-500">
                    <span>Class 12-A</span>
                    <span class="text-slate-700">|</span>
                    <span>APS Fatehgarh</span>
                </div>
            </div>
            <p class="text-slate-500 text-sm animate-pulse">Tap anywhere to start</p>
        </div>
    </div>

    <main id="app-content" class="hidden min-h-screen pb-32">
        <header class="p-6 flex justify-between items-center sticky top-0 z-40 bg-slate-950/80 backdrop-blur-md">
            <div>
                <h2 id="view-title" class="text-2xl font-black italic text-sky-400">DASHBOARD</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase">Army Public School</p>
            </div>
            <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center border border-white/5 shadow-inner">
                <i data-lucide="brain-circuit" class="w-6 h-6 text-sky-400"></i>
            </div>
        </header>

        <div id="dynamic-view" class="px-6 space-y-6">
            </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 glass rounded-[2.5rem] p-4 flex justify-around items-center z-40 border border-white/10 shadow-2xl">
        <button onclick="renderView('doubt')" id="nav-doubt" class="text-slate-500 transition-all"><i data-lucide="message-circle"></i></button>
        <button onclick="renderView('quiz')" id="nav-quiz" class="text-slate-500 transition-all"><i data-lucide="award"></i></button>
        <button onclick="renderDashboard()" id="nav-home" class="text-sky-400 bg-sky-500/10 p-3 rounded-2xl"><i data-lucide="layout-grid"></i></button>
        <button onclick="renderView('syllabus')" id="nav-syllabus" class="text-slate-500 transition-all"><i data-lucide="book-open"></i></button>
        <button onclick="renderView('notes')" id="nav-notes" class="text-slate-500 transition-all"><i data-lucide="file-text"></i></button>
    </nav>

    <script>
        lucide.createIcons();
        let appData = { quiz: {}, syllabus: {}, notes: {} };

        async function loadData() {
            try {
                const [q, s, n] = await Promise.all([
                    fetch('quiz.json').then(r => r.json()),
                    fetch('syllabus.json').then(r => r.json()),
                    fetch('notes.json').then(r => r.json())
                ]);
                appData = { quiz: q, syllabus: s, notes: n };
            } catch (e) { console.error("JSON Error: Files missing!"); }
        }

        function enterApp() {
            document.getElementById('splash-screen').classList.add('opacity-0', 'invisible');
            document.getElementById('app-content').classList.remove('hidden');
            renderDashboard();
        }

        window.onload = loadData;

        function renderDashboard() {
            const container = document.getElementById('dynamic-view');
            document.getElementById('view-title').innerText = "DASHBOARD";
            container.innerHTML = `
                <div class="grid grid-cols-2 gap-4 animate-pop">
                    <div onclick="renderView('doubt')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-4 border-b-4 border-sky-500 active:scale-95 transition">
                        <div class="p-4 bg-sky-500/10 rounded-2xl text-sky-400"><i data-lucide="help-circle"></i></div>
                        <span class="font-black text-xs tracking-widest uppercase">Solver</span>
                    </div>
                    <div onclick="renderView('quiz')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-4 border-b-4 border-green-500 active:scale-95 transition">
                        <div class="p-4 bg-green-500/10 rounded-2xl text-green-400"><i data-lucide="brain"></i></div>
                        <span class="font-black text-xs tracking-widest uppercase">Quiz</span>
                    </div>
                    <div onclick="renderView('syllabus')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-4 border-b-4 border-purple-500 active:scale-95 transition">
                        <div class="p-4 bg-purple-500/10 rounded-2xl text-purple-400"><i data-lucide="scroll"></i></div>
                        <span class="font-black text-xs tracking-widest uppercase">Syllabus</span>
                    </div>
                    <div onclick="renderView('notes')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-4 border-b-4 border-yellow-500 active:scale-95 transition">
                        <div class="p-4 bg-yellow-500/10 rounded-2xl text-yellow-400"><i data-lucide="file-text"></i></div>
                        <span class="font-black text-xs tracking-widest uppercase">Notes</span>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderView(view) {
            const container = document.getElementById('dynamic-view');
            document.getElementById('view-title').innerText = view.toUpperCase();

            if(view === 'doubt') {
                container.innerHTML = `
                    <div class="space-y-6 animate-pop">
                        <div class="glass p-6 rounded-[2.5rem] border-2 border-sky-500/20">
                            <textarea id="m-input" class="w-full bg-transparent outline-none text-xl mb-4 p-2 font-bold placeholder:text-slate-600" rows="3" placeholder="Type: 2+2, 5*10, or integrate(x^2)..."></textarea>
                            <button onclick="smartSolve()" class="w-full card-grad py-5 rounded-3xl font-black tracking-widest shadow-xl active:scale-95 transition">SOLVE PROBLEM</button>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="document.getElementById('cam').click()" class="glass p-6 rounded-3xl flex flex-col items-center gap-2"><i data-lucide="camera" class="text-sky-400"></i><span class="text-[10px] font-bold uppercase">Camera</span><input type="file" id="cam" capture="environment" class="hidden" onchange="ocr(event)"></button>
                            <button onclick="document.getElementById('stor').click()" class="glass p-6 rounded-3xl flex flex-col items-center gap-2"><i data-lucide="image" class="text-sky-400"></i><span class="text-[10px] font-bold uppercase">Storage</span><input type="file" id="stor" class="hidden" onchange="ocr(event)"></button>
                        </div>
                        <div id="ans-box" class="hidden"></div>
                    </div>
                `;
            } else if(view === 'quiz') {
                container.innerHTML = `<div class="glass p-6 rounded-[2.5rem] space-y-4 animate-pop">
                    <select id="q-c" onchange="loadQTopics()" class="w-full bg-slate-900 p-5 rounded-2xl border border-white/10 font-bold outline-none">
                        <option value="">Select Class</option>
                        ${Object.keys(appData.quiz).map(c => `<option value="${c}">Class ${c}</option>`).join('')}
                    </select>
                    <div id="q-sub" class="hidden space-y-4">
                        <select id="q-t" class="w-full bg-slate-900 p-5 rounded-2xl border border-white/10 font-bold outline-none"></select>
                        <button onclick="beginQuiz()" class="w-full card-grad py-5 rounded-2xl font-black">START QUIZ</button>
                    </div>
                    <div id="quiz-screen"></div>
                </div>`;
            } else if(view === 'syllabus' || view === 'notes') {
                container.innerHTML = `<div class="glass p-6 rounded-[2.5rem] mb-4 animate-pop">
                    <select id="l-c" onchange="${view === 'syllabus' ? 'showSyl()' : 'showNot()'}" class="w-full bg-slate-900 p-5 rounded-2xl border border-white/10 font-bold outline-none">
                        <option value="">Select Class</option>
                        ${Object.keys(view === 'syllabus' ? appData.syllabus : appData.notes).map(c => `<option value="${c}">Class ${c}</option>`).join('')}
                    </select>
                </div><div id="list-container" class="space-y-4"></div>`;
            }
            lucide.createIcons();
        }

        // --- SOLVER ENGINE (Addition, Multiplication, Class 12 Algebra) ---
        function smartSolve() {
            const input = document.getElementById('m-input').value;
            displaySolution(input);
        }

        async function ocr(e) {
            const box = document.getElementById('ans-box');
            box.classList.remove('hidden');
            box.innerHTML = `<p class="text-center text-sky-400 animate-pulse font-bold">Scanning Problem...</p>`;
            const worker = await Tesseract.createWorker('eng');
            const { data: { text } } = await worker.recognize(e.target.files[0]);
            displaySolution(text);
            await worker.terminate();
        }

        function displaySolution(input) {
            const box = document.getElementById('ans-box');
            box.classList.remove('hidden');
            try {
                // Dual Engine: Math.js for 1+2, 5*10 | Algebrite for x+x, integration
                let ans;
                if (/^[0-9+\-*/().\s]+$/.test(input.trim())) {
                    ans = math.evaluate(input);
                } else {
                    ans = Algebrite.run(input).toString();
                }
                box.innerHTML = `
                    <div class="glass p-8 rounded-[2.5rem] border-l-8 border-green-500 animate-pop shadow-2xl">
                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Solution Found</p>
                        <h2 class="text-4xl font-black text-white tracking-tight">${ans}</h2>
                    </div>
                `;
            } catch(e) { box.innerHTML = `<div class="glass p-6 rounded-3xl text-red-400 font-bold">Syntax Error. Check numbers/operators.</div>`; }
        }

        // --- QUIZ & CONTENT LOGIC ---
        function loadQTopics() {
            const c = document.getElementById('q-c').value;
            const sub = document.getElementById('q-sub');
            if(!c) return;
            document.getElementById('q-t').innerHTML = Object.keys(appData.quiz[c]).map(t => `<option value="${t}">${t}</option>`).join('');
            sub.classList.remove('hidden');
        }

        function beginQuiz() {
            const c = document.getElementById('q-c').value;
            const t = document.getElementById('q-t').value;
            renderQuizQ(appData.quiz[c][t], 0, 0);
        }

        function renderQuizQ(qs, i, score) {
            const screen = document.getElementById('quiz-screen');
            const q = qs[i];
            screen.innerHTML = `
                <div class="space-y-6 mt-6 animate-pop">
                    <p class="text-xs font-black text-sky-500 uppercase">Question ${i+1}/${qs.length}</p>
                    <p class="text-lg font-bold">${q.q}</p>
                    <div class="grid gap-3">
                        ${q.o.map(o => `<button onclick="handleAns('${o}','${q.a}',${i},${JSON.stringify(qs).replace(/"/g, '&quot;')},${score})" class="p-5 bg-slate-900 border border-white/5 rounded-2xl text-left hover:border-sky-500 transition">${o}</button>`).join('')}
                    </div>
                </div>
            `;
        }

        function handleAns(s, a, i, qs, score) {
            if(s === a) score++;
            if(i+1 < qs.length) {
                renderQuizQ(qs, i+1, score);
            } else {
                document.getElementById('quiz-screen').innerHTML = `
                    <div class="text-center p-10 glass rounded-[2.5rem] border-2 border-sky-500 mt-6 animate-pop">
                        <i data-lucide="trophy" class="w-16 h-16 text-yellow-400 mx-auto mb-4"></i>
                        <h2 class="text-3xl font-black mb-2">Quiz Result</h2>
                        <h3 class="text-6xl font-black text-white">${score} / ${qs.length}</h3>
                        <button onclick="renderView('quiz')" class="w-full card-grad py-4 rounded-2xl font-bold mt-8">RESTART</button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function showSyl() {
            const c = document.getElementById('l-c').value;
            if(!c) return;
            document.getElementById('list-container').innerHTML = appData.syllabus[c].map(s => `<div class="glass p-6 rounded-3xl border-l-4 border-purple-500 animate-pop"><h4 class="font-bold text-purple-400">${s.chapter}</h4><p class="text-[10px] text-slate-500 mt-2">${s.topics}</p></div>`).join('');
        }

        function showNot() {
            const c = document.getElementById('l-c').value;
            if(!c) return;
            document.getElementById('list-container').innerHTML = appData.notes[c].map(n => `<div class="glass p-8 rounded-3xl border-l-4 border-yellow-500 animate-pop"><h4 class="font-bold text-yellow-400 mb-3">${n.title}</h4><p class="text-sm text-slate-300 whitespace-pre-line">${n.content}</p></div>`).join('');
        }
    </script>
</body>
</html>
