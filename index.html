<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Guru - Nexus Developers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root { 
            --bg: #0b0f1a; --text-main: #ffffff; --text-sub: #94a3b8; 
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        .light-mode { 
            --bg: #f8fafc; --text-main: #0f172a; --text-sub: #475569; 
            --glass: rgba(255, 255, 255, 0.8); --border: rgba(15, 23, 42, 0.1);
            --input-bg: #ffffff;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); transition: 0.4s ease; overflow-x: hidden; }
        h1, h2, h3, h4, p, span { color: var(--text-main); }
        .sub-text { color: var(--text-sub) !important; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); }
        .card-grad { background: linear-gradient(135deg, #38bdf8, #1d4ed8); color: white !important; }
        .nexus-border { border: 1px solid rgba(56, 189, 248, 0.3); }
        
        input, select, textarea { background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-main) !important; }

        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>

    <div class="fixed top-6 right-6 z-[100]">
        <button onclick="toggleTheme()" class="glass p-3 rounded-2xl nexus-border active:scale-90 transition-all shadow-xl">
            <i id="theme-icon" data-lucide="moon" class="w-6 h-6 text-sky-400"></i>
        </button>
    </div>

    <div id="login-screen" class="fixed inset-0 z-[90] flex items-center justify-center bg-[var(--bg)] p-8 transition-all duration-500">
        <div class="w-full max-w-sm text-center space-y-8 animate-pop">
            <div class="relative w-32 h-32 mx-auto">
                <div class="absolute inset-0 bg-sky-500 rounded-[2.5rem] rotate-[30deg] opacity-10 animate-pulse"></div>
                <div class="relative w-32 h-32 glass rounded-[2.5rem] flex flex-col items-center justify-center nexus-border shadow-2xl">
                    <span class="text-[7px] font-black tracking-[0.2em] text-sky-500 uppercase">Maths Guru</span>
                    <i data-lucide="layout-grid" class="w-12 h-12 text-sky-400 my-1"></i>
                    <span class="text-[9px] font-bold tracking-[0.5em] sub-text">NEXUS</span>
                </div>
            </div>

            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter">MATHS GURU</h1>
                <p class="text-[9px] text-sky-500 font-bold uppercase tracking-[0.4em] mt-1">An Ultimate Educational App</p>
            </div>
            
            <div class="space-y-4 pt-4">
                <input type="text" id="user-name-input" placeholder="Enter Student Name" class="w-full p-5 rounded-2xl outline-none focus:border-sky-500 transition-all text-center font-bold text-lg">
                <button onclick="nexusLogin()" class="w-full card-grad py-5 rounded-2xl font-black tracking-widest shadow-lg active:scale-95 transition-all">LOGIN</button>
            </div>

            <div class="pt-8 space-y-4 opacity-70">
                <div class="space-y-1">
                    <p class="text-[9px] font-bold tracking-widest uppercase sub-text">Developed By Nexus Developers</p>
                    <p class="text-[11px] font-extrabold">Bikrant Singh & Abhinav Rajput</p>
                    <p class="text-[9px] font-medium uppercase sub-text">Class 12-A • APS Fatehgarh Cantt</p>
                </div>
            </div>
        </div>
    </div>

    <main id="app-content" class="hidden min-h-screen pb-32">
        <header class="p-8 flex justify-between items-center sticky top-0 z-40 backdrop-blur-md">
            <div>
                <p id="welcome-msg" class="text-[10px] font-bold text-sky-500 uppercase tracking-widest mb-1">Welcome</p>
                <h2 id="view-title" class="text-2xl font-extrabold uppercase tracking-tighter">Dashboard</h2>
            </div>
            <div class="w-12 h-12 glass rounded-2xl flex items-center justify-center nexus-border">
                <i data-lucide="zap" class="w-6 h-6 text-sky-400"></i>
            </div>
        </header>

        <div id="dynamic-view" class="px-6 space-y-6"></div>
    </main>

    <nav id="bottom-nav" class="hidden fixed bottom-6 left-6 right-6 glass rounded-[2.5rem] p-3 flex justify-around items-center z-40 shadow-2xl nexus-border">
        <button onclick="renderView('doubt')" class="p-3 sub-text hover:text-sky-400"><i data-lucide="search" class="w-6 h-6"></i></button>
        <button onclick="renderView('quiz')" class="p-3 sub-text hover:text-sky-400"><i data-lucide="award" class="w-6 h-6"></i></button>
        <button onclick="renderDashboard()" class="p-4 card-grad rounded-3xl shadow-xl active:scale-90 transition-all mx-2"><i data-lucide="home" class="w-6 h-6"></i></button>
        <button onclick="renderView('notes')" class="p-3 sub-text hover:text-sky-400"><i data-lucide="file-text" class="w-6 h-6"></i></button>
        <button onclick="renderView('syllabus')" class="p-3 sub-text hover:text-sky-400"><i data-lucide="layers" class="w-6 h-6"></i></button>
    </nav>

    <script>
        lucide.createIcons();
        let appData = { quiz: {}, syllabus: {}, notes: {}, tutors: {} };

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            const isLight = document.body.classList.contains('light-mode');
            icon.setAttribute('data-lucide', isLight ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function nexusLogin() {
            const name = document.getElementById('user-name-input').value.trim();
            if(!name) {
                alert("Please enter your name to login!");
                return;
            }
            document.getElementById('welcome-msg').innerText = `Welcome, ${name}`;
            document.getElementById('login-screen').classList.add('opacity-0', 'invisible');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            renderDashboard();
        }

        async function loadData() {
            try {
                const [q, s, n, t] = await Promise.all([
                    fetch('quiz.json').then(r => r.json()),
                    fetch('syllabus.json').then(r => r.json()),
                    fetch('notes.json').then(r => r.json()),
                    fetch('tutors.json').then(r => r.json())
                ]);
                appData = { quiz: q, syllabus: s, notes: n, tutors: t };
            } catch (e) { console.log("Data Syncing..."); }
        }
        window.onload = loadData;

        function getFooter() {
            return `<div class="mt-20 text-center pb-12 opacity-40 text-[8px] uppercase tracking-widest font-bold">Nexus Developers • APS Fatehgarh</div>`;
        }

        function renderDashboard() {
            const container = document.getElementById('dynamic-view');
            document.getElementById('view-title').innerText = "Dashboard";
            container.innerHTML = `
                <div class="grid grid-cols-2 gap-5 animate-pop">
                    <div onclick="renderView('doubt')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 border-b-4 border-sky-500 active:scale-95 transition-all">
                        <i data-lucide="search" class="w-8 h-8 text-sky-500"></i>
                        <span class="text-[10px] font-bold uppercase">AI Solver</span>
                    </div>
                    <div onclick="renderView('quiz')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 border-b-4 border-emerald-500 active:scale-95 transition-all">
                        <i data-lucide="award" class="w-8 h-8 text-emerald-500"></i>
                        <span class="text-[10px] font-bold uppercase">Quiz</span>
                    </div>
                    <div onclick="renderView('notes')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 border-b-4 border-amber-500 active:scale-95 transition-all">
                        <i data-lucide="file-text" class="w-8 h-8 text-amber-500"></i>
                        <span class="text-[10px] font-bold uppercase">Notes</span>
                    </div>
                    <div onclick="renderView('syllabus')" class="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 border-b-4 border-indigo-500 active:scale-95 transition-all">
                        <i data-lucide="layers" class="w-8 h-8 text-indigo-500"></i>
                        <span class="text-[10px] font-bold uppercase">Syllabus</span>
                    </div>
                    <div onclick="renderView('tutors')" class="col-span-2 glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 border-b-4 border-red-500 active:scale-95 transition-all">
                        <i data-lucide="youtube" class="w-10 h-10 text-red-500"></i>
                        <span class="text-[11px] font-bold uppercase tracking-widest">YouTube Channels</span>
                    </div>
                </div>
                ${getFooter()}
            `;
            lucide.createIcons();
        }

        function renderView(view) {
            const container = document.getElementById('dynamic-view');
            document.getElementById('view-title').innerText = view.toUpperCase();
            
            if(view === 'tutors') {
             container.innerHTML = `
        <div class="space-y-6 animate-pop">
            
            <div class="glass p-6 rounded-[2.5rem] bg-gradient-to-br from-yellow-500/20 to-orange-600/20 border-2 border-yellow-500/30">
                <div class="flex items-center gap-4">
                    <div class="bg-yellow-500 p-3 rounded-2xl">
                        <i data-lucide="lightbulb" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black text-yellow-500 uppercase tracking-tighter">Nexus Self-Study Tip</h3>
                        <p class="text-[11px] font-bold leading-tight text-[var(--text-main)]">"Self-study is very important. Videos can explain concepts, but only practice makes you a Master!"</p>
                    </div>
                </div>
            </div>

            <div class="glass p-8 rounded-[3rem] border-b-8 border-red-500 text-center">
                <i data-lucide="youtube" class="w-16 h-16 mx-auto text-red-500 mb-2"></i>
                <h2 class="text-xl font-bold">Best YouTube Tutors</h2>
            </div>

            <div class="glass p-5 rounded-3xl">
                <select id="t-class" onchange="handleTutorClass()" class="w-full p-4 rounded-2xl font-bold outline-none bg-transparent">
                    <option value="">Select Class</option>
                    <option value="8">Class 8th</option>
                    <option value="9">Class 9th</option>
                    <option value="10">Class 10th</option>
                    <option value="11">Class 11th</option>
                    <option value="12">Class 12th</option>
                </select>
            </div>

            <div id="stream-box" class="hidden glass p-5 rounded-3xl">
                <select id="t-stream" onchange="handleTutorStream()" class="w-full p-4 rounded-2xl font-bold outline-none bg-transparent">
                    <option value="">Choose Stream</option>
                    <option value="PCM">PCM (Science)</option>
                    <option value="PCB">PCB (Science)</option>
                    <option value="Commerce">Commerce</option>
                    <option value="Humanities">Humanities</option>
                </select>
            </div>

            <div id="subject-box" class="hidden glass p-5 rounded-3xl">
                <select id="t-subject" onchange="showFinalTutors()" class="w-full p-4 rounded-2xl font-bold outline-none bg-transparent"></select>
            </div>

            <div id="tutor-list" class="space-y-4"></div>

        </div>${getFooter()}`;
            
            } else if(view === 'doubt') {
                container.innerHTML = `<div class="glass p-8 rounded-[3rem] space-y-4 animate-pop"><textarea id="m-input" class="w-full bg-transparent outline-none text-xl p-2 font-bold" rows="3" placeholder="Enter query..."></textarea><button onclick="smartSolve()" class="w-full card-grad py-5 rounded-2xl font-black">SOLVE</button></div><div id="ans-box" class="hidden mt-6"></div>${getFooter()}`;
            } else if(view === 'notes') {
                container.innerHTML = `<div class="glass p-5 rounded-3xl mb-6"><select id="n-c" onchange="showNotes()" class="w-full bg-transparent font-bold outline-none"><option value="">Select Class</option>${Object.keys(appData.notes).map(c => `<option value="${c}">Class ${c}</option>`).join('')}</select></div><div id="list-container" class="space-y-4"></div>${getFooter()}`;
            } else if(view === 'syllabus') {
                container.innerHTML = `<div class="glass p-5 rounded-3xl mb-6"><select id="l-c" onchange="showSyl()" class="w-full bg-transparent font-bold outline-none"><option value="">Select Class</option>${Object.keys(appData.syllabus).map(c => `<option value="${c}">Class ${c}</option>`).join('')}</select></div><div id="list-container" class="space-y-3"></div>${getFooter()}`;
            } else if(view === 'quiz') {
                container.innerHTML = `<div class="glass p-8 rounded-[3rem] text-center space-y-6 animate-pop"><i data-lucide="award" class="mx-auto w-12 h-12 text-emerald-500"></i><select id="q-c" onchange="loadQTopics()" class="w-full p-4 rounded-xl font-bold bg-transparent">${Object.keys(appData.quiz).map(c => `<option value="${c}">Class ${c}</option>`).join('')}</select><div id="q-sub" class="hidden space-y-4"><select id="q-t" class="w-full p-4 rounded-xl font-bold bg-transparent"></select><button onclick="beginQuiz()" class="w-full card-grad py-5 rounded-2xl font-black">START</button></div></div><div id="quiz-screen"></div>${getFooter()}`;
            }
            lucide.createIcons();
        }

        function handleTutorClass() {
            const cls = document.getElementById('t-class').value;
            const streamBox = document.getElementById('stream-box');
            const subjectBox = document.getElementById('subject-box');
            document.getElementById('tutor-list').innerHTML = ""; 

            if(cls === "11" || cls === "12") {
                streamBox.classList.remove('hidden');
                subjectBox.classList.add('hidden');
            } else if(cls !== "") {
                streamBox.classList.add('hidden');
                subjectBox.classList.remove('hidden');
                const subjects = Object.keys(appData.tutors[cls] || {});
                document.getElementById('t-subject').innerHTML = `<option value="">Select Subject</option>` + subjects.map(s => `<option value="${s}">${s}</option>`).join('');
            } else {
                streamBox.classList.add('hidden');
                subjectBox.classList.add('hidden');
            }
        }

        function handleTutorStream() {
            const cls = document.getElementById('t-class').value;
            const stream = document.getElementById('t-stream').value;
            const subBox = document.getElementById('subject-box');
            if(stream) {
                subBox.classList.remove('hidden');
                const subjects = Object.keys(appData.tutors[cls][stream] || {});
                document.getElementById('t-subject').innerHTML = `<option value="">Select Subject</option>` + subjects.map(s => `<option value="${s}">${s}</option>`).join('');
            }
        }

        function showFinalTutors() {
            const cls = document.getElementById('t-class').value;
            const sub = document.getElementById('t-subject').value;
            const stream = document.getElementById('t-stream').value;
            const listDiv = document.getElementById('tutor-list');
            let tutors = (cls === "11" || cls === "12") ? appData.tutors[cls][stream][sub] : appData.tutors[cls][sub];
            
            if(tutors) {
                listDiv.innerHTML = tutors.map(t => `
                    <div class="glass p-6 rounded-3xl flex justify-between items-center border-l-4 border-red-500 mb-3 animate-pop">
                        <div><h4 class="font-bold text-lg">${t.name}</h4><p class="text-[10px] sub-text uppercase">Best for ${sub}</p></div>
                        <a href="${t.link}" target="_blank" class="bg-red-500/10 p-4 rounded-2xl text-red-500"><i data-lucide="play" class="w-5 h-5"></i></a>
                    </div>`).join('');
                lucide.createIcons();
            }
        }

        function showNotes() {
            const c = document.getElementById('n-c').value;
            if(!appData.notes[c]) return;
            document.getElementById('list-container').innerHTML = appData.notes[c].map(n => `<div class="glass p-6 rounded-3xl border-l-4 border-amber-500 animate-pop"><h4 class="font-bold text-amber-500 text-lg mb-2">${n.title}</h4><p class="text-sm opacity-90">${n.content}</p></div>`).join('');
        }

        function showSyl() {
            const c = document.getElementById('l-c').value;
            if(!appData.syllabus[c]) return;
            document.getElementById('list-container').innerHTML = appData.syllabus[c].map(s => `<div class="glass p-5 rounded-2xl flex justify-between items-center animate-pop"><div><h4 class="font-bold text-sky-500">${s.chapter}</h4><p class="text-[10px] uppercase sub-text">${s.topics}</p></div><span class="text-[10px] font-bold bg-sky-500/10 px-2 py-1 rounded text-sky-500">${s.weightage}</span></div>`).join('');
        }

        function smartSolve() {
            try {
                let res = math.evaluate(document.getElementById('m-input').value);
                const box = document.getElementById('ans-box');
                box.classList.remove('hidden');
                box.innerHTML = `<div class="glass p-8 rounded-[2.5rem] border-l-8 border-sky-500 animate-pop"><h2 class="text-4xl font-black">${res}</h2></div>`;
            } catch(e) { alert("Format Error!"); }
        }

        function loadQTopics() {
            const c = document.getElementById('q-c').value;
            document.getElementById('q-t').innerHTML = Object.keys(appData.quiz[c] || {}).map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('q-sub').classList.remove('hidden');
        }

        function beginQuiz() {
            const c = document.getElementById('q-c').value;
            const t = document.getElementById('q-t').value;
            renderQuizQ(appData.quiz[c][t], 0, 0);
        }

        function renderQuizQ(qs, i, score) {
            const screen = document.getElementById('quiz-screen');
            const q = qs[i];
            screen.innerHTML = `<div class="space-y-4 mt-8 animate-pop p-6 glass rounded-[2.5rem]"><p class="text-center text-[10px] font-bold sub-text">Q ${i+1}/${qs.length}</p><p class="text-lg font-bold text-center">${q.question}</p><div class="grid gap-2">${q.options.map(o => `<button onclick="handleAns('${o}','${q.answer}',${i},${JSON.stringify(qs).replace(/"/g, '&quot;')},${score})" class="p-4 glass rounded-xl text-left font-semibold hover:border-sky-500 transition-all">${o}</button>`).join('')}</div></div>`;
        }

        function handleAns(s, a, i, qs, score) {
            if(s === a) score++;
            if(i+1 < qs.length) renderQuizQ(qs, i+1, score);
            else {
                document.getElementById('quiz-screen').innerHTML = `<div class="text-center p-10 glass rounded-3xl mt-6 animate-pop border-4 border-emerald-500"><i data-lucide="award" class="mx-auto text-yellow-500 mb-2 w-12 h-12"></i><h2 class="text-3xl font-black">${score}/${qs.length}</h2><button onclick="renderDashboard()" class="w-full card-grad py-4 rounded-xl font-bold mt-6">Home</button></div>`;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
